<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dot Grid Avatar — Thinking States</title>
  <style>
    :root {
      --bg: #efeae0;
      --dot: #1a1a1a;
      --size: 520px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f0f10; --dot: #f2efe7; }
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--dot);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 32px;
      box-sizing: border-box;
      min-height: 100vh;
    }
    .stage {
      width: var(--size);
      height: var(--size);
      position: relative;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .controls {
      display: flex;
      gap: 8px;
    }
    .controls button {
      font: 500 11px ui-sans-serif, system-ui, sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--dot) 22%, transparent);
      background: transparent;
      color: var(--dot);
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }
    .controls button:hover {
      border-color: color-mix(in srgb, var(--dot) 60%, transparent);
    }
    .controls button.active {
      background: var(--dot);
      color: var(--bg);
      border-color: var(--dot);
    }
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="c"></canvas>
  </div>
  <div class="controls" id="controls">
    <button data-pattern="pulse" class="active">Pulse</button>
    <button data-pattern="stars">Stars</button>
    <button data-pattern="summary">Summary</button>
  </div>

<script>
(() => {
  'use strict';
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const stage = canvas.parentElement;

  const config = {
    spacing: 13,
    baseRadius: 1.0,
    amp: 4.8,
    baseAlpha: 0.24,
    peakAlpha: 1.0,
    edgeFadeFrac: 0.05,
  };

  const PERIODS = { pulse: 2.6, stars: 2.6, summary: 3.5 };

  // Epitrochoid samples for the Summary pattern — cached, recomputed only when R changes.
  const summaryCurve = { samples: null, R: -1 };
  function getSummaryCurve(R) {
    if (summaryCurve.samples && summaryCurve.R === R) return summaryCurve.samples;
    const N = 220;
    const rhoMain = 0.42 * R;
    const rhoD = 0.18 * R;
    const K = 8; // (R+r)/r = 8  ->  7 loops per revolution
    const arr = new Float64Array(N * 2);
    for (let i = 0; i < N; i++) {
      const th = (2 * Math.PI * i) / N;
      arr[i * 2]     = rhoMain * Math.cos(th) - rhoD * Math.cos(K * th);
      arr[i * 2 + 1] = rhoMain * Math.sin(th) - rhoD * Math.sin(K * th);
    }
    summaryCurve.samples = arr;
    summaryCurve.R = R;
    return arr;
  }

  let W = 0, H = 0, R = 0, dpr = 1;
  let dots = [];
  let pattern = 'pulse';

  // Flat-top hexagon SDF with apothem `a`. Returns signed perpendicular distance
  // (negative inside, positive outside). Inside test: sdf < 0.
  const SQRT3_2 = 0.8660254037844387;
  function sdfHexFlatTop(x, y, a) {
    return Math.max(Math.abs(y), SQRT3_2 * Math.abs(x) + 0.5 * Math.abs(y)) - a;
  }

  function dotColor() {
    return getComputedStyle(document.documentElement).getPropertyValue('--dot').trim() || '#111';
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = stage.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    R = Math.min(W, H) / 2;
    buildGrid();
  }

  function buildGrid() {
    dots = [];
    const s = config.spacing;
    const rowH = s * SQRT3_2;
    const cx = W / 2, cy = H / 2;
    const apothem = R - 2;
    const edgeFadeW = R * config.edgeFadeFrac;
    const rowsHalf = Math.ceil(R / rowH) + 1;
    const colsHalf = Math.ceil(R / s) + 1;
    for (let ry = -rowsHalf; ry <= rowsHalf; ry++) {
      const xOffset = (ry & 1) ? s / 2 : 0;
      const yy = cy + ry * rowH;
      for (let rx = -colsHalf; rx <= colsHalf; rx++) {
        const xx = cx + rx * s + xOffset;
        const dx = xx - cx, dy = yy - cy;
        const sdf = sdfHexFlatTop(dx, dy, apothem);
        if (sdf > 0) continue;
        const edge = Math.min(1, -sdf / edgeFadeW);
        dots.push({ x: xx, y: yy, dx, dy, edge });
      }
    }
  }

  // Each pattern is an intensity field (dx, dy, tSeconds, R) -> [0, 1].
  const patterns = {
    pulse(dx, dy, t, R) {
      const T = PERIODS.pulse;
      const d = Math.hypot(dx, dy);
      const phase = (t / T) % 1;
      const sigma = R * 0.11;
      let g = 0;
      for (let k = 0; k < 2; k++) {
        const p = (phase + k * 0.5) % 1;
        const ringR = p * R * 1.15;
        const fade = (1 - p) * (1 - p);
        const z = (d - ringR) / sigma;
        const ring = fade * Math.exp(-z * z);
        if (ring > g) g = ring;
      }
      const hs = R * 0.10;
      const heart = 0.42 * Math.exp(-(d * d) / (2 * hs * hs));
      return heart > g ? heart : g;
    },
    stars(dx, dy, t, R) {
      const T = PERIODS.stars;
      const phase = (t / T) % 1;

      const off = R * 0.28;
      // [cx, cy, activeStart]. Clockwise sequential: TL -> TR -> BR -> BL.
      const centers = [
        [-off, -off, 0.00],   // TL - active [0.00, 0.25]
        [ off, -off, 0.25],   // TR - active [0.25, 0.50]
        [-off,  off, 0.75],   // BL - active [0.75, 1.00]
        [ off,  off, 0.50],   // BR - active [0.50, 0.75]
      ];
      const activeWindow = 0.50;

      const sigThin = R * 0.028;
      const invThin2 = 1 / (2 * sigThin * sigThin);

      let g = 0;
      for (let i = 0; i < 4; i++) {
        const c = centers[i];
        const localPhase = ((phase - c[2]) % 1 + 1) % 1;

        let localEnv;
        if (localPhase < activeWindow) {
          const tp = localPhase / activeWindow;
          localEnv = 0.25 + 0.75 * Math.sin(tp * Math.PI);
        } else {
          localEnv = 0.25;
        }

        const sigBody = R * (0.050 + 0.040 * localEnv);
        const tau     = R * (0.09 + 0.14 * localEnv);
        const invBody2 = 1 / (2 * sigBody * sigBody);

        const sx = dx - c[0];
        const sy = dy - c[1];
        const ax = Math.abs(sx), ay = Math.abs(sy);

        const body = Math.exp(-(sx * sx + sy * sy) * invBody2);
        const hRay = Math.exp(-(sy * sy) * invThin2) * Math.exp(-ax / tau);
        const vRay = Math.exp(-(sx * sx) * invThin2) * Math.exp(-ay / tau);

        let star = body;
        if (hRay > star) star = hRay;
        if (vRay > star) star = vRay;
        star *= localEnv;
        if (star > g) g = star;
      }
      return g;
    },
    summary(dx, dy, t, R) {
      const T = PERIODS.summary;
      const tau = (t / T) % 1;
      const samples = getSummaryCurve(R);
      const N = samples.length / 2;

      const sigma = R * 0.033;              // cursive stroke thickness
      const inv2s2 = 1 / (2 * sigma * sigma);
      const maxD2 = 16 * sigma * sigma;     // skip samples past ~4 sigma

      const baseline = 0.30;                // whole scribble stays drawn at 30%
      const sigmaT = 0.07;                  // moving-highlight width in u-space
      const inv2t2 = 1 / (2 * sigmaT * sigmaT);

      let g = 0;
      for (let i = 0; i < N; i++) {
        const px = samples[i * 2];
        const py = samples[i * 2 + 1];
        const ex = dx - px, ey = dy - py;
        const dist2 = ex * ex + ey * ey;
        if (dist2 > maxD2) continue;
        const spatial = Math.exp(-dist2 * inv2s2);

        const u = i / N;
        let du = u - tau;
        du = du - Math.round(du);          // wrap to [-0.5, 0.5]
        const timeF = baseline + (1 - baseline) * Math.exp(-du * du * inv2t2);

        const v = spatial * timeF;
        if (v > g) g = v;
      }
      return g;
    },
  };

  let raf = 0;
  function frame(t) {
    const tSec = t / 1000;
    const fn = patterns[pattern];
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = dotColor();
    for (let i = 0; i < dots.length; i++) {
      const d = dots[i];
      const g = fn(d.dx, d.dy, tSec, R);
      const r = (config.baseRadius + config.amp * g) * d.edge;
      if (r < 0.15) continue;
      const a = (config.baseAlpha + (config.peakAlpha - config.baseAlpha) * g) * d.edge;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    raf = requestAnimationFrame(frame);
  }

  document.getElementById('controls').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-pattern]');
    if (!btn) return;
    pattern = btn.dataset.pattern;
    document.querySelectorAll('#controls button').forEach((b) => {
      b.classList.toggle('active', b === btn);
    });
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      cancelAnimationFrame(raf);
      resize();
      raf = requestAnimationFrame(frame);
    }, 80);
  });

  resize();
  raf = requestAnimationFrame(frame);
})();
</script>
</body>
</html>
